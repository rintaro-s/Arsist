<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsist UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .info-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }

        .info-section h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .info-section p {
            line-height: 1.6;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .success {
            color: #00ff88;
        }

        .error {
            color: #ff4444;
        }

        .warning {
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Arsist Engine</h1>
        
        <div class="info-section">
            <h2>Welcome to XREAL</h2>
            <p>HTMLベースのUI表示テストです。このUIはUnity内のWebViewで描画されています。</p>
        </div>

        <div class="info-section">
            <h2>Platform Information</h2>
            <p id="platform-info">Loading...</p>
        </div>

        <div class="button-group">
            <button onclick="onActionClick('test')">Test</button>
            <button onclick="onActionClick('settings')">Settings</button>
            <button onclick="onActionClick('info')">Info</button>
        </div>

        <div class="status" id="status-message">
            Ready to interact
        </div>
    </div>

    <script>
        // プラットフォーム情報の表示
        function updatePlatformInfo() {
            const userAgent = navigator.userAgent;
            const isAndroid = /Android/.test(userAgent);
            const platform = isAndroid ? 'Android' : 'Web';
            
            const infoEl = document.getElementById('platform-info');
            infoEl.textContent = `Platform: ${platform}, User Agent: ${userAgent.substring(0, 50)}...`;
        }

        // ボタン動作
        function onActionClick(action) {
            const statusEl = document.getElementById('status-message');
            const timestamp = new Date().toLocaleTimeString();
            
            switch(action) {
                case 'test':
                    statusEl.innerHTML = `<span class="success">Test executed at ${timestamp}</span>`;
                    if (window.UnityMessageManager) {
                        window.UnityMessageManager.sendMessage('ArsistWebViewUI', 'OnUIAction', 'test');
                    }
                    break;
                case 'settings':
                    statusEl.innerHTML = `<span class="warning">Settings opened at ${timestamp}</span>`;
                    if (window.UnityMessageManager) {
                        window.UnityMessageManager.sendMessage('ArsistWebViewUI', 'OnUIAction', 'settings');
                    }
                    break;
                case 'info':
                    statusEl.innerHTML = `<span class="info">Info displayed at ${timestamp}</span>`;
                    if (window.UnityMessageManager) {
                        window.UnityMessageManager.sendMessage('ArsistWebViewUI', 'OnUIAction', 'info');
                    }
                    break;
            }
        }

        // ページロード時
        document.addEventListener('DOMContentLoaded', () => {
            updatePlatformInfo();
            console.log('Arsist HTML UI loaded successfully');
        });
    </script>
</body>
</html>
